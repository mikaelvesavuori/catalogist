name: Release

permissions:
  contents: read
  packages: write

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint './src/**/*.ts' --quiet

      - name: Test
        run: npm test

      - name: Check licenses
        run: npm run licenses

      - name: Publish to NPM
        run: npm publish --access public
