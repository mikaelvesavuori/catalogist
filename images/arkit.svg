link <b>GetRecord</b> to getRecord--><path d="M279.568,84.756 C284.146,120.531 297.5,224.891 302.798,266.289 " fill="none" id="&lt;b&gt;GetRecord&lt;/b&gt;-&gt;getRecord" style="stroke: #000000; stroke-width: 1.0;"/><polygon fill="#000000" points="303.461,271.473,306.2871,262.0383,302.8268,266.5134,298.3517,263.0531,303.461,271.473" style="stroke: #000000; stroke-width: 1.0;"/><script type="text/plantuml"><![CDATA[MD5=[aa9ef9c65ce189a91bc0dfd0e074caad]
@startuml

scale max 1920 width
top to bottom direction

skinparam nodesep 12
skinparam ranksep 24
skinparam monochrome true
skinparam shadowing false
skinparam defaultFontName Tahoma
skinparam defaultFontSize 12
skinparam roundCorner 6
skinparam dpi 150
skinparam arrowColor black
skinparam arrowThickness 0.5
skinparam packageTitleAlignment left

skinparam usecase {
  borderThickness 0.5
}

skinparam rectangle {
  borderThickness 0.5
}

skinparam component {
  borderThickness 1
}


package "Adapters" {
  (<b>CreateRecord</b>)
  (<b>GetRecord</b>)
}

package "Domain entities" {
  (Catalogist)
}

package "Domain value objects" {
  rectangle "Manifest" as _Manifest
}

package "Repositories" {
  (DynamoDbRepo)
}

package "Usecases" {
  (createRecord)
  (getRecord)
}

(createRecord) ---> (Catalogist)
(createRecord) ---> _Manifest
(<b>CreateRecord</b>) ----[thickness=1]> (createRecord)
(<b>CreateRecord</b>) ---[thickness=1]> (DynamoDbRepo)
(getRecord) ---> (Catalogist)
(<b>GetRecord</b>) ---[thickness=1]> (DynamoDbRepo)
(<b>GetRecord</b>) ----[thickness=1]> (getRecord)

@enduml


' View and edit on https://arkit.pro
]]></script></g></svg>